<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
     <link rel="stylesheet" href="edit.css">
</head>
<body>

    <div class="container">

        <a href="../Page3/Page-rekap/rekap.html" class="kembali">
            Kembali
        </a>

        <div class="header-input">

            <div class="icon-user">
                <img src="">
            </div>

            <div class="teks-header">

                <h1>Edit data customer</h1>

                <p>
                    Lengkapi data customer baru di bawah ini
                </p>

            </div>
        </div>

        <div id="popup" class="popup">Data Berhasil Disimpan</div>

        <div class="card-input">

            <label>Nama Custumer</label>
            <input id="nama" type="text" placeholder="Masukan nama customer" autocomplete="off">

            <label>Alamat Custumer</label>
            <input id="alamat" type="text" placeholder="Masukan alamat customer" autocomplete="off">

            <label>No. HP / WhatsApp</label>
            <input id="nomer" type="text" placeholder="Masukan nomor HP" autocomplete="off">

            <label>Jumlah pembelian unit</label>
            <input id="jumlah-unit" type="number" placeholder="Masukan jumlah unit" autocomplete="off">

            <label>Kincir air yang dibeli</label>
            <input id="kincir-apa" type="text" placeholder="Masukan jenis kincir" autocomplete="off">

            <label>Tanggal input</label>
            <input id="tanggal" type="date">

            <button id="simpan" class="button-simpan">
                SIMPAN
            </button>

        </div>
    </div>
       <div class="lingkaran"></div>
       <div class="lingkaran-2"></div>
       <script src="edit.js"></script>
</body>
</html>
